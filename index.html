<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Shivansh Bansal — I build systems, not just websites." />
  <meta property="og:title" content="Shivansh Bansal | Engine" />
  <meta property="og:description" content="I see what's broken. I build what fixes it." />
  <meta name="theme-color" content="#050505" />
  <title>Shivansh Bansal</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />

  <style>
    /* ═══════════════════════════════════════════════════════════════
       DESIGN TOKENS
    ═══════════════════════════════════════════════════════════════ */
    :root {
      --bg: #050505;
      --surface: #0a0a0a;
      --text: #ffffff;
      --muted: #6b6b6b;
      --silver: #eaeaeb;
      --blue: #0047ff;
      --border: rgba(255, 255, 255, 0.08);
      --font-display: 'Syne', sans-serif;
      --font-body: 'Inter', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      --ease-brutal: cubic-bezier(0.85, 0, 0.15, 1);
      --ease-snap: cubic-bezier(1, 0, 0, 1);
    }

    /* ═══════════════════════════════════════════════════════════════
       RESET
    ═══════════════════════════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      overflow-x: hidden;
      cursor: none;
      -webkit-font-smoothing: antialiased;
    }

    ::selection { background: var(--blue); color: #fff; }

    /* ═══════════════════════════════════════════════════════════════
       GRID OVERLAY
    ═══════════════════════════════════════════════════════════════ */
    .grid-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      pointer-events: none;
      z-index: 1;
      opacity: 0.15;
      background-image:
        linear-gradient(to right, #fff 1px, transparent 1px),
        linear-gradient(to bottom, #fff 1px, transparent 1px);
      background-size: 100px 100px;
    }

    /* ═══════════════════════════════════════════════════════════════
       CUSTOM CURSOR (desktop only)
    ═══════════════════════════════════════════════════════════════ */
    .cursor-crosshair {
      position: fixed;
      top: 0; left: 0;
      width: 24px; height: 24px;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: width 0.3s var(--ease-brutal), height 0.3s var(--ease-brutal);
    }
    .cursor-crosshair::before,
    .cursor-crosshair::after {
      content: '';
      position: absolute;
      background: var(--text);
    }
    .cursor-crosshair::before { top: 50%; left: 0; width: 100%; height: 1px; }
    .cursor-crosshair::after  { top: 0; left: 50%; width: 1px; height: 100%; }

    .cursor-coords {
      position: fixed;
      top: 0; left: 0;
      pointer-events: none;
      z-index: 9999;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--blue);
      padding: 10px 14px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      white-space: nowrap;
    }

    a, button { cursor: none; }
    a:hover ~ .cursor-crosshair { width: 40px; height: 40px; opacity: 0.5; }

    /* ═══════════════════════════════════════════════════════════════
       GLOBAL TYPOGRAPHY
    ═══════════════════════════════════════════════════════════════ */
    h1, h2, h3 { font-family: var(--font-display); line-height: 0.9; text-transform: uppercase; }
    .mono-label {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ═══════════════════════════════════════════════════════════════
       NAV
    ═══════════════════════════════════════════════════════════════ */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 2vw;
      mix-blend-mode: difference;
    }
    .nav-sys {
      color: #fff;
      font-family: var(--font-mono);
      font-weight: 700;
      font-size: 12px;
    }
    .nav-status {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .nav-status .dot {
      width: 6px; height: 6px;
      background: var(--blue);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.2; } }

    /* ═══════════════════════════════════════════════════════════════
       HERO
    ═══════════════════════════════════════════════════════════════ */
    #hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 4vw;
      position: relative;
      z-index: 10;
    }

    .hero-content { will-change: transform; }

    h1.hero-title {
      font-size: 11vw;
      letter-spacing: -0.06em;
      margin-left: -0.5vw;
      color: var(--silver);
    }
    .hero-title span { display: block; }
    .hero-title .outline {
      color: transparent;
      -webkit-text-stroke: 1px var(--muted);
    }

    .hero-sub {
      margin-top: 4vh;
      max-width: 450px;
      font-size: clamp(16px, 1.5vw, 24px);
      line-height: 1.5;
      color: var(--silver);
    }

    /* Marquee */
    .hero-marquee {
      position: absolute;
      bottom: 10vh; left: 0;
      width: 100%;
      overflow: hidden;
      white-space: nowrap;
      mix-blend-mode: exclusion;
      pointer-events: none;
      z-index: -1;
    }
    .marquee-track {
      display: inline-block;
      animation: scroll-left 30s linear infinite;
    }
    .marquee-text {
      font-family: var(--font-display);
      font-size: 12vw;
      color: var(--bg);
      -webkit-text-stroke: 1px var(--border);
      text-transform: uppercase;
      margin-right: 5vw;
    }
    @keyframes scroll-left {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    /* ═══════════════════════════════════════════════════════════════
       ABOUT
    ═══════════════════════════════════════════════════════════════ */
    #about {
      position: relative;
      background: var(--surface);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      display: flex;
      z-index: 10;
    }

    .about-left {
      width: 50vw;
      padding: 10vw 4vw;
      border-right: 1px solid var(--border);
    }
    .about-right {
      width: 50vw;
      padding: 10vw 4vw;
    }

    .about-statement {
      font-size: clamp(24px, 3vw, 42px);
      line-height: 1.3;
      letter-spacing: -0.02em;
    }
    .h-line { height: 1px; background: var(--border); margin: 4vw 0; }

    .signal { margin-bottom: 4vw; }
    .signal-num {
      font-family: var(--font-mono);
      color: var(--blue);
      font-size: 14px;
      margin-bottom: 8px;
    }
    .signal h3 { font-size: clamp(20px, 2vw, 28px); margin-bottom: 12px; }
    .signal p  { font-size: 16px; color: var(--muted); line-height: 1.6; max-width: 80%; }

    /* ═══════════════════════════════════════════════════════════════
       WORK — HORIZONTAL SCROLL (desktop)
    ═══════════════════════════════════════════════════════════════ */
    .horizontal-wrapper {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-wrap: nowrap;
      overflow: hidden;
      background: var(--bg);
      position: relative;
      z-index: 20;
    }

    .work-intro {
      flex: 0 0 50vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 4vw;
      border-right: 1px solid var(--border);
    }

    .work-panel {
      flex: 0 0 70vw;
      height: 100vh;
      display: flex;
      align-items: center;
      padding: 0 5vw;
      border-right: 1px solid var(--border);
      position: relative;
    }

    .project-card {
      width: 100%;
      height: 70vh;
      background: var(--surface);
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 3vw;
      position: relative;
      overflow: hidden;
      text-decoration: none;
      color: var(--text);
      transition: border-color 0.4s var(--ease-brutal), transform 0.4s var(--ease-brutal);
    }
    .project-card:hover { border-color: var(--blue); transform: scale(0.98); }

    .project-bg-num {
      position: absolute;
      top: -5%; right: 2%;
      font-family: var(--font-display);
      font-size: 40vh;
      line-height: 1;
      color: var(--bg);
      -webkit-text-stroke: 1px rgba(255,255,255,0.05);
      z-index: 0;
      pointer-events: none;
    }

    .project-content { position: relative; z-index: 2; }

    .project-title { font-size: clamp(40px, 5vw, 80px); margin-bottom: 20px; }
    .project-desc  { font-size: 18px; color: var(--muted); max-width: 400px; line-height: 1.5; }

    .project-meta {
      position: relative;
      z-index: 2;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }
    .project-link-btn {
      width: 60px; height: 60px;
      border-radius: 50%;
      background: var(--text);
      color: var(--bg);
      display: flex; justify-content: center; align-items: center;
      font-family: var(--font-mono); font-size: 24px;
      transition: background 0.3s, transform 0.3s;
    }
    .project-card:hover .project-link-btn { background: var(--blue); color: #fff; transform: rotate(45deg); }

    /* ═══════════════════════════════════════════════════════════════
       CONNECT
    ═══════════════════════════════════════════════════════════════ */
    #connect {
      padding: 15vw 4vw;
      background: var(--blue);
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      position: relative;
      z-index: 30;
    }

    .connect-title { font-size: 12vw; color: #fff; }
    .connect-title:hover { color: var(--bg); }

    .connect-links { display: flex; gap: 2vw; margin-top: 5vw; }

    .connect-link {
      font-family: var(--font-mono);
      font-size: 16px;
      padding: 20px 40px;
      border: 1px solid #fff;
      text-transform: uppercase;
      text-decoration: none;
      color: #fff;
      transition: background 0.3s var(--ease-brutal), color 0.3s var(--ease-brutal);
    }
    .connect-link:hover { background: #fff; color: var(--blue); }

    /* ═══════════════════════════════════════════════════════════════
       FOOTER
    ═══════════════════════════════════════════════════════════════ */
    footer {
      background: var(--bg);
      padding: 4vw;
      display: flex;
      justify-content: space-between;
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--muted);
      border-top: 1px solid var(--border);
    }

    /* ═══════════════════════════════════════════════════════════════
       MOBILE — max-width: 900px
       Every rule here is additive. Desktop CSS above is untouched.
       Core problems solved:
         1. Project titles overflow card (VK INDUSTRIES, MINDSPACE etc)
            → font-size too large + project-card overflow:hidden clips them
            → fix: smaller font-size + overflow:visible on card
         2. Hero title "SHIVANSH" cut off
            → font-size 14vw too large for 8 bold chars on narrow screen
            → fix: 8vw (mathematically safe for Syne ExtraBold at 8 chars)
         3. Nav mix-blend-mode makes text invisible
            → fix: normal blend + frosted glass bg
         4. Huge empty space above/below hero
            → height:100vh not overridden, only min-height added
            → fix: height:auto + min-height:100svh
         5. GSAP horizontal scroll panels stuck on mobile
            → fix: all panels reset, GSAP gated behind isDesktop check in JS
    ═══════════════════════════════════════════════════════════════ */
    @media (max-width: 900px) {

      /* ── 1. CURSOR ── */
      html, body { cursor: auto; }
      .cursor-crosshair,
      .cursor-coords { display: none; }
      a, button { cursor: pointer; }

      /* ── 2. NAV ── */
      nav {
        mix-blend-mode: normal;
        background: rgba(5, 5, 5, 0.92);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        padding: 14px 20px;
        border-bottom: 1px solid var(--border);
      }
      nav .mono-label { color: var(--silver); }
      nav .nav-sys    { color: var(--silver); }

      /* ── 3. HERO ── */
      #hero {
        height: auto;           /* override desktop 100vh — critical */
        min-height: 100svh;
        padding: 90px 20px 48px;
        justify-content: center;
      }

      /*
        Hero title font-size calculation for Syne ExtraBold:
        - Available width: device_width - (2 × 20px padding) = ~360px on 400px phone
        - "SHIVANSH" = 8 glyphs. Syne ExtraBold advance width ≈ 0.72em per glyph.
        - letter-spacing: -0.02em → effective per-glyph width ≈ 0.70em
        - Max safe em = 360px / (8 × 0.70) = 64.3px
        - 64px / 400px = 16vw per em → use 8vw (half, since formula above is total)
        - Wait: 8vw × 8chars × 0.70 = 44.8vw → 44.8% of 400px = 179px. Too small.
        - Correct: font-size F, width = F × 8 × 0.70 ≤ 360px → F ≤ 64px
        - 64px on 400px phone = 16vw. Use 15vw to be safe (gives 6px breathing room).
        - On 320px phone: 15vw = 48px × 8 × 0.70 = 269px vs 280px available. Safe.
        - On 390px (iPhone 14): 15vw = 58.5px × 8 × 0.70 = 327px vs 350px. Safe.
      */
      h1.hero-title {
        font-size: 11vw;
        letter-spacing: -0.02em;
        margin-left: 0;
        line-height: 1.0;
        width: 100%;
      }
      /* Each span (SHIVANSH / BANSAL) is display:block so each sits on its own line.
         No overflow:hidden — the section clips anything truly extreme. */
      h1.hero-title span {
        display: block;
      }

      .hero-sub {
        font-size: 15px;
        line-height: 1.65;
        max-width: 100%;
        margin-top: 20px;
        color: var(--silver);
      }

      .hero-marquee { display: none; }

      /* ── 4. ABOUT ── */
      #about { flex-direction: column; }

      .about-left {
        width: 100%;
        padding: 48px 20px 32px;
        border-right: none;
        border-bottom: 1px solid var(--border);
      }
      .about-right {
        width: 100%;
        padding: 32px 20px 48px;
      }

      .about-statement {
        font-size: clamp(18px, 5vw, 28px);
        line-height: 1.4;
      }

      .signal { margin-bottom: 24px; }
      .signal h3 { font-size: clamp(18px, 5vw, 26px); }
      .signal p  { font-size: 15px; max-width: 100%; line-height: 1.65; }
      .h-line    { margin: 20px 0; }

      /* ── 5. WORK PANELS ──
         The core issue in the screenshot:
         .project-title uses clamp(40px, 5vw, 80px) → on mobile 5vw=~20px but
         clamp floors at 40px. 40px × "VK INDUSTRIES" (12 chars) at Syne ExtraBold
         overflows the card. The card also has overflow:hidden so it clips the text.

         Fix:
         - Override project-title font-size to a safe mobile value
         - Set project-card overflow to visible so nothing gets clipped
         - The card border still looks correct; only internal overflow clips are removed
      ── */
      #work-container {
        position: static !important;
        height: auto !important;
        overflow: visible !important;
      }

      .horizontal-wrapper {
        height: auto !important;
        flex-direction: column !important;
        overflow: visible !important;
        transform: none !important;
        width: 100% !important;
      }

      .work-intro {
        flex: none !important;
        width: 100% !important;
        height: auto !important;
        min-height: unset !important;
        padding: 48px 20px 32px !important;
        border-right: none !important;
        border-bottom: 1px solid var(--border) !important;
        transform: none !important;
        justify-content: flex-start;
      }
      /* Override the inline style margin on the mono-label inside work-intro */
      .work-intro .mono-label { margin-bottom: 12px !important; }

      .work-panel {
        flex: none !important;
        width: 100% !important;
        height: auto !important;
        min-height: unset !important;
        padding: 24px 20px 32px !important;
        border-right: none !important;
        border-bottom: 1px solid var(--border) !important;
        transform: none !important;
        position: static !important;
        align-items: stretch !important;
      }

      /* Override inline padding-right: 15vw on last panel */
      .work-panel[style] {
        padding-right: 20px !important;
      }

      /* Override inline margin-bottom: 2vw on mono-labels inside panels */
      .work-panel .mono-label[style] {
        margin-bottom: 10px !important;
      }

      .project-card {
        height: auto !important;
        min-height: unset !important;
        /* CRITICAL: change overflow from hidden to visible.
           overflow:hidden was clipping the project titles.
           The card border is unaffected by this change. */
        overflow: visible !important;
        padding: 24px 20px 20px !important;
      }

      /* Background number: keep decorative but contained */
      .project-bg-num {
        font-size: 35vw;
        opacity: 0.6;
      }

      /*
        Project title fix — the main issue in screenshot:
        "VK INDUSTRIES" = 12 chars, "MINDSPACE" = 9 chars.
        At 40px (clamp floor) these overflow the card width (~340px).
        12 chars × 40px × 0.70 (glyph ratio) = 336px. Just barely fits but
        letter-spacing compounds it. Safe size: 22px fixed.
        "VK INDUSTRIES" at 22px × 12 × 0.70 = 184px. Clearly fits.
        "VK\nINDUSTRIES" wraps naturally because white-space:normal.
      */
      .project-title {
        font-size: 22px !important;
        line-height: 1.0 !important;
        margin-bottom: 12px !important;
        white-space: normal !important;
        word-break: break-word !important;
        overflow: visible !important;
        width: 100% !important;
      }

      .project-desc {
        font-size: 13px !important;
        max-width: 100% !important;
        line-height: 1.6 !important;
      }

      .project-meta { margin-top: 20px !important; align-items: center !important; }

      .project-link-btn {
        width: 48px !important;
        height: 48px !important;
        min-width: 48px !important;
        font-size: 18px !important;
        flex-shrink: 0 !important;
      }

      /* ── 6. CONNECT ── */
      #connect { padding: 64px 20px 56px; }

      .connect-title {
        font-size: clamp(40px, 14vw, 80px);
        line-height: 1.0;
      }

      #connect > p[style] {
        max-width: 100% !important;
        margin-top: 20px !important;
        font-size: 12px;
        line-height: 1.7;
      }

      .connect-links {
        flex-direction: column;
        gap: 12px;
        margin-top: 32px;
        width: 100%;
      }

      .connect-link {
        width: 100%;
        text-align: center;
        padding: 16px 20px;
        min-height: 56px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        letter-spacing: 0.1em;
      }

      /* ── 7. FOOTER ── */
      footer {
        padding: 24px 20px;
        flex-direction: column;
        align-items: center;
        gap: 8px;
